name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Check st_core module
        working-directory: backend
        run: cargo check -p st_core

      - name: Test st_core module
        working-directory: backend
        run: cargo test -p st_core

      - name: Check pairing module
        working-directory: backend
        run: cargo check -p pairing

      - name: Test pairing module
        working-directory: backend
        run: cargo test -p pairing

      - name: Check metrics module
        working-directory: backend
        run: cargo check -p metrics

      - name: Test metrics module
        working-directory: backend
        run: cargo test -p metrics

      - name: Check tournament module
        working-directory: backend
        run: cargo check -p tournament

      - name: Test tournament module
        working-directory: backend
        run: cargo test -p tournament

      - name: Check validation module
        working-directory: backend
        run: cargo check -p validation

      - name: Test validation module
        working-directory: backend
        run: cargo test -p validation

      - name: Check archiving module
        working-directory: backend
        run: cargo check -p archiving

      - name: Test archiving module
        working-directory: backend
        run: cargo test -p archiving

      - name: Check API integration
        working-directory: backend
        run: cargo check -p api

      - name: Run integration tests
        working-directory: backend
        run: cargo test -p integration_tests

      - name: Run backend tests
        working-directory: backend
        run: cargo test --workspace --exclude chess
        env:
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org

      - name: Build backend
        working-directory: backend
        run: cargo build --workspace --release --exclude chess

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cargo audit
        working-directory: backend
        run: |
          cargo install cargo-audit
          cargo audit

  monitoring-test:
    name: Test Monitoring Stack
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start monitoring stack
        working-directory: backend
        run: |
          docker-compose -f docker-compose.monitoring.yml up -d
          sleep 30

      - name: Test Prometheus endpoint
        run: |
          curl -f http://localhost:9090/-/healthy || exit 1

      - name: Test Grafana endpoint
        run: |
          curl -f http://localhost:3000/api/health || exit 1

      - name: Cleanup
        working-directory: backend
        run: |
          docker-compose -f docker-compose.monitoring.yml down

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, monitoring-test]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ github.repository }}:latest \
            --push \
            .
