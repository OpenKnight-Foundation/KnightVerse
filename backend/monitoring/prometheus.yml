global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'xlmate-backend'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'xlmate-http-metrics'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics/http'
    scrape_interval: 10s
