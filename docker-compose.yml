version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: knightverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: knightverse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knightverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knightverse_password}
      POSTGRES_DB: ${POSTGRES_DB:-knightverse_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knightverse}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
